<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cockpit clients — Studio Me&YouToo</title><meta name="robots" content="noindex,nofollow"><link rel="icon" href="assets/img/brand/favicon.png"><link rel="stylesheet" href="assets/css/style.css"></head><body><div class="app-shell"><aside class="sidebar" id="sidebar-root"></aside><main class="main"><div class="topbar compact-topbar"><div><p class="eyebrow">Administration</p><h1 class="page-title">Cockpit clients</h1><p class="lead">Créez les organisations, leurs comptes clients et attribuez les crédits de passation.</p></div><button class="button button-primary" id="new-org">+ Nouveau client</button></div><div id="admin-alert" class="composer-alert" hidden></div><section id="admin-organizations" class="admin-org-grid"></section></main></div><dialog id="org-dialog" class="admin-dialog"><form method="dialog" id="org-form"><h2>Créer une organisation cliente</h2><div class="field"><label>Nom de l’entreprise</label><input id="org-name" required></div><div class="parameter-grid"><div class="field"><label for="org-credit-pack">Crédits attribués</label><select id="org-credit-pack"><option value="0">0 crédit</option><option value="50">50 crédits</option><option value="100">100 crédits</option><option value="200">200 crédits</option><option value="500">500 crédits</option><option value="700">700 crédits</option><option value="1200">1 200 crédits</option><option value="1500">1 500 crédits</option><option value="1700">1 700 crédits</option><option value="2000">2 000 crédits</option><option value="2500">2 500 crédits</option><option value="3000">3 000 crédits</option><option value="4000">4 000 crédits</option><option value="5000">5 000 crédits</option><option value="7000">7 000 crédits</option><option value="custom">Crédits personnalisés</option></select><div id="org-custom-credit-wrap" class="admin-custom-credit" hidden><label for="org-quota">Nombre personnalisé de crédits</label><input id="org-quota" type="number" min="0" step="1" value="0" inputmode="numeric"></div><span class="hint">1 crédit correspond à 1 passation.</span></div><div class="field"><label for="org-expiry">Validité du pack</label><input id="org-expiry" type="date"></div></div><div class="top-actions"><button class="button button-ghost" value="cancel">Annuler</button><button class="button button-primary" value="default" id="create-org">Créer</button></div></form></dialog><dialog id="user-dialog" class="admin-dialog"><form method="dialog" id="user-form"><h2>Créer un compte client</h2><input id="user-org-id" type="hidden"><div class="parameter-grid"><div class="field"><label>Prénom</label><input id="user-first"></div><div class="field"><label>Nom</label><input id="user-last"></div></div><div class="field"><label>Email professionnel</label><input id="user-email" type="email" required></div><div class="field"><label>Mot de passe temporaire</label><input id="user-password" minlength="10" required></div><div class="top-actions"><button class="button button-ghost" value="cancel">Annuler</button><button class="button button-primary" value="default" id="create-user">Créer le compte</button></div></form></dialog><script src="assets/js/app.js"></script><script src="assets/js/api.js"></script><script src="assets/js/admin.js"></script></body></html>
